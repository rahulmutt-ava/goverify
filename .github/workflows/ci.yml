name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking PR tier (spec §12): static checks, unit, corpus +
  # determinism. Hard wall-clock budget: 10 minutes.
  checks:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # z3-sys static-link compiles Z3 from source on a cold cache (~20 min);
    # warm runs stay well under the spec's 10-minute budget via rust-cache.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: mise run lint
      # `test` runs the full workspace, which already includes the corpus
      # + determinism integration test — no separate `mise run corpus` step.
      - run: mise run test

  secrets:
    runs-on: ubuntu-latest
    # Headroom for cold mise tool caches (cargo-audit builds from source).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: mise run secrets

  audit:
    runs-on: ubuntu-latest
    # Headroom for cold mise tool caches (cargo-audit builds from source).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: mise run audit
