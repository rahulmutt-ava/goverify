name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Nightly tier (spec §12): fuzz campaign; new-CVE sweep on old code.
  fuzz:
    runs-on: ubuntu-latest
    # Three 900s fuzz runs are 45 min, plus a cold `smt_reader` build: it
    # pulls goverify-solver -> unconditional vendored z3-sys, i.e. the same
    # ~20 min CMake Z3 build the differential job budgets for below.
    # 45 + 20 + setup headroom = 75.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz -> target
      - run: cargo +nightly fuzz run gvir_decode -- -max_total_time=900
      - run: cargo +nightly fuzz run ir_lower -- -max_total_time=900
      - run: cargo +nightly fuzz run smt_reader -- -max_total_time=900
  audit:
    runs-on: ubuntu-latest
    # Headroom for cold mise tool caches (cargo-audit builds from source).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: mise run audit
  differential:
    runs-on: ubuntu-latest
    # Cold z3-sys build dominates (~20 min) + 256 dual-solver queries.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: mise x -- cargo test -p goverify-solver --all-features --test differential -- --ignored
