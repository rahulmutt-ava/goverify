[tools]
go = "1.26.5"
rust = "1.97.1"
protoc = "35.1"
buf = "1.72.0"
gitleaks = "8.30.1"
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-fuzz" = "0.13.2"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "1.36.11"
# z3-sys's "vendored" feature builds bundled Z3 (4.16.0, via z3-src) via
# CMake. Pinned to the 3.x line: Z3's CMakeLists requires 3.4+, and CMake
# 4.x dropped compatibility with cmake_minimum_required < 3.5.
cmake = "4.3.3"
# Pinned z3 CLI for the SmtLib2Process differential backend (Task 7).
# GitHub release tags are "z3-<ver>" (not bare "<ver>"). Matches the
# bundled Z3 (z3-src 416.0.2) so the differential isolates the process
# plumbing rather than comparing solver versions.
"ubi:Z3Prover/z3" = { version = "z3-4.16.0", exe = "z3" }

[tasks.build]
description = "build all workspace crates"
run = "cargo build --workspace"

[tasks.test]
description = "unit + integration tests"
run = "cargo test --workspace --all-features"

[tasks.lint]
description = "blocking-tier static checks"
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "buf lint",
  "sh -c 'cd extractor && test -z \"$(gofmt -l .)\" && go vet ./...'",
]

[tasks.fmt]
description = "format Rust and Go sources"
run = ["cargo fmt --all", "sh -c 'cd extractor && gofmt -w .'"]

[tasks.corpus]
description = "corpus + determinism suite (full extractor pipeline)"
run = [
  "cargo test -p goverify-extract --test extract_integration",
  "cargo test -p goverify-ir --test lower_golden --test lower_corpus --test callgraph_corpus",
  "cargo test -p goverify-analysis --test engine_corpus",
  "cargo test -p goverify-checkers --test nil_corpus --test bounds_corpus --test knownfp_corpus --test ensures_corpus",
  "cargo test -p goverify-cli --test debug_integration",
]

[tasks.bench]
description = "benchmark suite (populated in phase 5)"
run = "cargo bench --workspace"

[tasks.audit]
description = "dependency CVE scan (Cargo.lock)"
run = "cargo audit"

[tasks.secrets]
description = "secret scan of the repo"
run = "gitleaks detect --redact"

[tasks.proto-gen]
description = "regenerate Go protobuf bindings (commit the output)"
run = "protoc --go_out=extractor --go_opt=module=goverify.dev/extractor proto/gvir/v1/gvir.proto"

[tasks.setup]
description = "one-time dev setup: git hooks"
run = "git config core.hooksPath .githooks"

[tasks.fuzz]
description = "fuzz smoke run (nightly tier; needs rustup nightly)"
run = [
  "cargo +nightly fuzz run gvir_decode -- -max_total_time=60",
  "cargo +nightly fuzz run ir_lower -- -max_total_time=60",
  "cargo +nightly fuzz run smt_reader -- -max_total_time=60",
  "cargo +nightly fuzz run ir_encode -- -max_total_time=60",
]
dir = "{{cwd}}"

[tasks.shakeout]
description = "phase-4 shakeout: goverify check over pinned bbolt (manual; clones on first run)"
run = "scripts/shakeout.sh"
